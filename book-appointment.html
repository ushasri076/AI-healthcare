<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - AI Healthcare</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="page">
        <a href="index.html" class="back-btn">Back to Home</a>
        <h1>Book Appointment</h1>
        <form id="appointment-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required>

            <label for="doctor">Select Doctor:</label>
            <select id="doctor" name="doctor" required>
                <option value="">Choose a doctor</option>
                <option value="dr-smith">Dr. Smith - Cardiologist</option>
                <option value="dr-johnson">Dr. Johnson - Dermatologist</option>
                <option value="dr-williams">Dr. Williams - Pediatrician</option>
                <option value="dr-brown">Dr. Brown - Orthopedic</option>
            </select>

            <label for="timing">Available Timing:</label>
            <select id="timing" name="timing" required>
                <option value="">Choose a time</option>
                <option value="9am">9:00 AM</option>
                <option value="10am">10:00 AM</option>
                <option value="11am">11:00 AM</option>
                <option value="2pm">2:00 PM</option>
                <option value="3pm">3:00 PM</option>
            </select>

            <label for="fee">Consultation Fee: $50</label>

            <label for="payment">Payment Method:</label>
            <select id="payment" name="payment" required>
                <option value="">Choose payment method</option>
                <option value="credit">Credit Card</option>
                <option value="debit">Debit Card</option>
                <option value="paypal">PayPal</option>
            </select>

            <button type="submit">Book Appointment</button>
        </form>
    </div>
    <script>
        document.getElementById('appointment-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Appointment booked successfully!');
            // In a real app, this would send data to server
        });
    </script>
</body>
</html>
